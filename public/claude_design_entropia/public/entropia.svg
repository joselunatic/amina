<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" id="amina_spatial_layout">
  

  <defs>
    
    <filter id="glow_subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
    </filter>
    
    
    <pattern id="grid_tech" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#001500" stroke-width="0.5"></path>
    </pattern>
  </defs>

  
  <rect width="800" height="600" fill="#000500"></rect>
  <rect width="800" height="600" fill="url(#grid_tech)"></rect>

  
  <g id="system_corridors" class="corridor">
    <path d="M 400 245 V 130"></path> 
    <path d="M 450 280 L 550 210"></path> 
    <path d="M 450 320 L 550 390"></path> 
    <path d="M 400 355 V 470"></path> 
    <path d="M 350 300 H 250"></path> 
  </g>

  
  
  
  <g id="zone_cmd" class="zone-group">
    <polygon points="400,245 450,275 450,325 400,355 350,325 350,275" class="zone_shape normal" filter="url(#glow_subtle)"></polygon>
    <circle id="zone_cmd_anchor" cx="400" cy="300" r="1" opacity="0"></circle>
    <text x="400" y="295" class="label_text" text-anchor="middle">COMMAND</text>
    <text x="400" y="310" class="sub_text" text-anchor="middle">NÚCLEO AMINA</text>
    <rect x="350" y="245" width="100" height="110" class="hitbox"></rect>
  </g>

  
  <g id="zone_lab" class="zone-group">
    <rect x="320" y="60" width="160" height="70" class="zone_shape normal" filter="url(#glow_subtle)"></rect>
    <circle id="zone_lab_anchor" cx="400" cy="95" r="1" opacity="0"></circle>
    <text x="400" y="95" class="label_text" text-anchor="middle">LABORATORY</text>
    <text x="400" y="108" class="sub_text" text-anchor="middle">SISTEMA ORDO</text>
    <rect x="320" y="60" width="160" height="70" class="hitbox"></rect>
  </g>

  
  <g id="zone_arm" class="zone-group">
    <rect x="550" y="160" width="140" height="90" class="zone_shape normal" filter="url(#glow_subtle)"></rect>
    <circle id="zone_arm_anchor" cx="620" cy="205" r="1" opacity="0"></circle>
    <text x="620" y="200" class="label_text" text-anchor="middle">ARMORY</text>
    <text x="620" y="213" class="sub_text" text-anchor="middle">PROTOCOLOS MEL</text>
    <rect x="550" y="160" width="140" height="90" class="hitbox"></rect>
  </g>

  
  <g id="zone_gar" class="zone-group">
    <rect x="550" y="350" width="140" height="90" class="zone_shape normal" filter="url(#glow_subtle)"></rect>
    <circle id="zone_gar_anchor" cx="620" cy="395" r="1" opacity="0"></circle>
    <text x="620" y="390" class="label_text" text-anchor="middle">GARAGE</text>
    <text x="620" y="403" class="sub_text" text-anchor="middle">ACCESO EXTERNO</text>
    <rect x="550" y="350" width="140" height="90" class="hitbox"></rect>
  </g>

  
  <g id="zone_med" class="zone-group">
    <rect x="320" y="470" width="160" height="70" class="zone_shape normal" filter="url(#glow_subtle)"></rect>
    <circle id="zone_med_anchor" cx="400" cy="505" r="1" opacity="0"></circle>
    <text x="400" y="505" class="label_text" text-anchor="middle">MEDICAL</text>
    <text x="400" y="518" class="sub_text" text-anchor="middle">ESTADO_AGENTE</text>
    <rect x="320" y="470" width="160" height="70" class="hitbox"></rect>
  </g>

  
  <g id="zone_sec" class="zone-group">
    <rect x="110" y="180" width="140" height="240" class="zone_shape normal" filter="url(#glow_subtle)"></rect>
    <circle id="zone_sec_anchor" cx="180" cy="300" r="1" opacity="0"></circle>
    <text x="180" y="295" class="label_text" text-anchor="middle">SECURITY</text>
    <text x="180" y="308" class="sub_text" text-anchor="middle">HOLDING_AREA</text>
    <rect x="110" y="180" width="140" height="240" class="hitbox"></rect>
  </g>

  
  <g id="ui_metadata" style="pointer-events: none;">
    <text x="20" y="30" class="label_text" style="fill: #004411;">AMINA // SISTEMA DE DISPOSICIÓN ESPACIAL</text>
    <text x="20" y="45" class="sub_text">REF: DIV_OPERACIONES_MEMBRANA // MONITOR_ACTIVO</text>
    <text x="600" y="580" class="sub_text" text-anchor="end">SISTEMA_INTEGRIDAD: OPERATIVO</text>
    <path d="M 610 577 H 780" stroke="#003311" stroke-width="0.5"></path>
  </g>
</svg>