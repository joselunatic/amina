<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMINA - Vista de Agente</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="agent.css" />
</head>
<body>
    <div id="map"></div>
    <div id="glitch-overlay" class="glitch-overlay"></div>
    <div id="vignette-overlay" class="vignette-overlay"></div>
    <div id="noise-overlay" class="noise-overlay"></div>
    <div id="blackout-overlay" class="blackout-overlay"></div>
    <div id="media-image-overlay" class="media-overlay media-image-overlay">
        <img id="media-image-el" src="" alt="" />
        <div class="media-caption" id="media-image-caption"></div>
    </div>
    <div id="media-video-overlay" class="media-overlay media-video-overlay">
        <video id="media-video-el" playsinline></video>
        <div class="media-caption" id="media-video-caption"></div>
    </div>
    <div id="card-overlay" class="card-overlay">
        <div class="card-inner">
            <div class="card-subtitle" id="card-subtitle"></div>
            <div class="card-title" id="card-title"></div>
            <div class="card-body" id="card-body"></div>
            <div class="card-meta" id="card-meta"></div>
        </div>
    </div>
    <div id="transmission-overlay" class="transmission-overlay">
        <div class="transmission-inner">
            <div class="transmission-header">
                <span>TRANSMISIÓN INTERCEPTADA</span>
                <span id="transmission-freq">---.- MHz</span>
            </div>
            <div class="transmission-source" id="transmission-source">FUENTE DESCONOCIDA</div>
            <div class="transmission-wave" id="transmission-wave"></div>
            <div class="transmission-content" id="transmission-content"></div>
            <div class="transmission-footer">● GRABANDO — TRANSCRIPCIÓN PARCIAL — ANÁLISIS DE VOZ EN COLA</div>
        </div>
    </div>
    <div id="correlation-overlay" class="correlation-overlay">
        <div class="correlation-inner">
            <div class="correlation-title" id="correlation-title">CORRELACIÓN ANÓMALA DETECTADA</div>
            <div class="correlation-nodes" id="correlation-nodes"></div>
            <div class="correlation-stamp" id="correlation-stamp">
                <div class="correlation-confidence" id="correlation-confidence"></div>
                <div class="correlation-source" id="correlation-source"></div>
            </div>
        </div>
    </div>
    <div id="dossier-overlay" class="dossier-overlay">
        <div class="dossier-inner">
            <div class="dossier-header">
                <span class="dossier-classification" id="dossier-classification">EXPEDIENTE — ORDO VERITATIS</span>
                <span class="dossier-stamp" id="dossier-stamp">CLASIFICADO</span>
            </div>
            <div class="dossier-name" id="dossier-name"></div>
            <div class="dossier-body">
                <div class="dossier-photo" id="dossier-photo"></div>
                <div class="dossier-fields" id="dossier-fields"></div>
            </div>
            <div class="dossier-summary" id="dossier-summary"></div>
            <div class="dossier-meta" id="dossier-meta"></div>
        </div>
    </div>
    <div id="file-recovery-overlay" class="file-recovery-overlay">
        <div class="recovery-inner">
            <div class="recovery-title">ARCHIVE RECOVERY IN PROGRESS</div>
            <div class="recovery-progress">
                <div class="recovery-bar" id="recovery-bar"></div>
                <div class="recovery-percent" id="recovery-percent">0%</div>
            </div>
            <div class="recovery-content" id="recovery-content"></div>
            <div class="recovery-image" id="recovery-image"></div>
        </div>
    </div>
    <div id="signal-triangulation-overlay" class="signal-triangulation-overlay">
        <div class="triangulation-inner">
            <div class="triangulation-title">SIGNAL TRIANGULATION</div>
            <div class="triangulation-coords">
                <div class="coord-item"><span class="coord-label">LAT:</span> <span class="coord-value" id="tri-lat">00.0000</span></div>
                <div class="coord-item"><span class="coord-label">LNG:</span> <span class="coord-value" id="tri-lng">00.0000</span></div>
            </div>
            <div class="triangulation-bars">
                <div class="tri-bar" id="tri-bar-1"></div>
                <div class="tri-bar" id="tri-bar-2"></div>
                <div class="tri-bar" id="tri-bar-3"></div>
                <div class="tri-bar" id="tri-bar-4"></div>
                <div class="tri-bar" id="tri-bar-5"></div>
            </div>
            <div class="triangulation-precision">
                <span class="precision-label">PRECISION:</span>
                <span class="precision-value" id="tri-precision">73%</span>
            </div>
            <div class="triangulation-status" id="tri-status">SCANNING...</div>
        </div>
    </div>
    <audio id="audio-player"></audio>
    <div id="agent-id-display"></div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="agent.js" type="module"></script>
</body>
</html>
